syntax = "proto3";

package MyNetwork;

enum MsgType{
	UNKNOW=0;
	NOTIFICATION_BEGIN=1;
	SCANQRCODE=2;
	WAITAUTH=3;
	LOGINSUCCESS=4;
	LOGINFAIL=5;
	AUTHSUCCESS=6;
	
	
	SENDMESSAGE=101;
	RECIVEMESSAGE=102;
	NOTIFICATION_END=999;
}

enum SendMsgType{
	UNKNOWN = 0;
	TEXT=1;

}
message Response {
    MsgType type = 1;
    int32 id = 2;
    bytes data = 3;
}

message Request{
 MsgType type = 1;
    int32 id = 2;
    bytes data = 3;
}

message SendMessageRequest{
	string wxid = 1;

	string content = 2;

	SendMsgType msg_type = 3;

}